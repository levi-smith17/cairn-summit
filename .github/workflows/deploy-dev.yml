name: Deploy Dev

"on":
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  test-lambda:
    name: Test Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests
        run: npm run test --workspace=apps/api -- --run --reporter=verbose

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Web tests
        run: npm run test:run --workspace=apps/web --reporter=verbose

  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    needs: test-lambda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda functions
        working-directory: apps/api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [ test-lambda, test-web ]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform apply \
            -var-file="../shared.tfvars" \
            -var-file="dev.tfvars" \
            -auto-approve

  deploy-lambda-basecamp:
    name: Deploy Lambda — Basecamp
    runs-on: ubuntu-latest
    needs: [build-lambda, terraform-apply]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: dev
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs basecamp/get basecamp/sidebar

