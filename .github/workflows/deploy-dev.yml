name: Deploy Dev

"on":
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests
        run: npm run test --workspace=apps/api -- --run

  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: test
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda functions
        working-directory: apps/api
        run: npm run build

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: dev
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs markers/get markers/create markers/update markers/delete

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform apply \
            -var-file="../shared.tfvars" \
            -var-file="dev.tfvars" \
            -auto-approve