name: PR Checks

"on":
  pull_request:
    branches:
      - dev
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect infra changes
        id: changes
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^infrastructure/'; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "infra=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests
        run: npm run test --workspace=apps/api -- --run --reporter=verbose

      - name: Run Web tests
        run: npm run test:run --workspace=apps/web --reporter=verbose

      - name: Check for Loading… text in routes
        run: |
          if rg 'Loading(\.\.\.| calendars)' apps/web/src/routes --glob '*.tsx'; then
            echo 'Found forbidden loading text in route files. Use skeletons instead.'
            exit 1
          fi
          echo 'No forbidden loading text found.'

  terraform-plan-dev:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    environment: dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (prod DNS)
        uses: aws-actions/configure-aws-credentials@v4
        id: prod-creds
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: us-east-1
          output-credentials: true

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/dev
        env:
          TF_VAR_dns_access_key: ${{ steps.prod-creds.outputs.aws-access-key-id }}
          TF_VAR_dns_secret_key: ${{ steps.prod-creds.outputs.aws-secret-access-key }}
          TF_VAR_dns_session_token: ${{ steps.prod-creds.outputs.aws-session-token }}
        run: |
          terraform plan \
            -var-file="../shared.tfvars" \
            -var-file="dev.tfvars" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post dev plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/environments/dev/plan_output.txt', 'utf8');
            const truncated = plan.length > 65000 ? plan.substring(0, 65000) + '\n... (truncated)' : plan;
            const output = `#### Terraform Plan (dev) 📖
            \`\`\`
            ${truncated}
            \`\`\`
            *Pusher: @${{ github.actor }}, Action: ${{ github.event_name }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  terraform-plan-prod:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    #environment: prod
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform plan \
            -var-file="../shared.tfvars" \
            -var-file="prod.tfvars" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post prod plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/environments/prod/plan_output.txt', 'utf8');
            const truncated = plan.length > 65000 ? plan.substring(0, 65000) + '\n... (truncated)' : plan;
            const output = `#### Terraform Plan (prod) 📖
            \`\`\`
            ${truncated}
            \`\`\`
            *Pusher: @${{ github.actor }}, Action: ${{ github.event_name }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
