  deploy-lambda-guides:
    name: Deploy Lambda — Guides
    needs: [build-lambda, terraform-apply]
    uses: ./.github/workflows/deploy-lambda.yml
    with:
      environment: prod
      functions: guides/get guides/create guides/update guides/delete guides/stones-get guides/stones-create guides/stones-update guides/stones-delete guides/stones-import guides/stones-placement-update guides/placements-reset
    secrets:
