  deploy-lambda-starfield:
    name: Deploy Lambda — Starfield
    needs: [build-lambda, terraform-apply]
    uses: ./.github/workflows/deploy-lambda.yml
    with:
      environment: prod
      functions: starfield/network-create starfield/network-delete starfield/network-update starfield/networks-get starfield/outposts-get starfield/outpost-create starfield/outpost-delete starfield/outpost-position starfield/outpost-resource-delete starfield/outpost-resource-upsert starfield/outpost-update starfield/resource-create starfield/resource-delete starfield/resource-update starfield/resources-get starfield/system-create starfield/system-delete starfield/system-planet-create starfield/system-planet-delete starfield/system-planet-update starfield/system-update starfield/systems-get
    secrets:
