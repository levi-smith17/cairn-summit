name: Deploy Prod

"on":
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests
        run: npm run test --workspace=apps/api -- --run --reporter=verbose

      - name: Run  Web tests
        run: npm run test:run --workspace=apps/web --reporter=verbose

  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda functions
        working-directory: apps/api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist
          retention-days: 1

  deploy-lambda-itinerary:
    name: Deploy Lambda — Itinerary
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs itinerary/create itinerary/delete itinerary/update

  deploy-lambda-itinerary-subscriptions:
    name: Deploy Lambda — Itinerary Subscriptions
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs itinerary-subscriptions/create itinerary-subscriptions/delete itinerary-subscriptions/update

  deploy-lambda-logs:
    name: Deploy Lambda — Logs
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs logs/get logs/create logs/update logs/delete

  deploy-lambda-markers:
    name: Deploy Lambda — Markers
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs markers/get markers/create markers/update markers/delete

  deploy-lambda-settings:
    name: Deploy Lambda — Settings
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs settings/delete-account settings/get settings/update

  deploy-lambda-signals:
    name: Deploy Lambda — Signals
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs signals/get signals/delete signals/contact signals/mark-read signals/public-thread-get signals/public-thread-reply signals/reply signals/sync

  deploy-lambda-trails:
    name: Deploy Lambda — Trails
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs trails/get trails/create trails/update trails/delete

  deploy-lambda-waypoints:
    name: Deploy Lambda — Waypoints
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        working-directory: apps/api
        env:
          ENVIRONMENT: prod
          AWS_REGION: us-east-2
        run: node scripts/deploy.mjs waypoints/get waypoints/create waypoints/update waypoints/delete

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: test
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.PROD_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync apps/web/dist s3://${{ secrets.PROD_WEB_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp apps/web/dist/index.html s3://${{ secrets.PROD_WEB_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform apply \
            -var-file="../shared.tfvars" \
            -var-file="prod.tfvars" \
            -auto-approve