name: Deploy Prod

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test-lambda:
    name: Test Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests
        run: npm run test --workspace=apps/api -- --run --reporter=verbose

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Web tests
        run: npm run test:run --workspace=apps/web --reporter=verbose

  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    needs: test-lambda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda functions
        working-directory: apps/api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: apps/api/dist
          retention-days: 1

  shared-infrastructure:
    name: Shared Infrastructure
    runs-on: ubuntu-latest
    needs: [test-lambda, test-web]
    environment: prod

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for shared infrastructure changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'infrastructure/terraform/environments/shared/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        if: steps.changes.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/terraform/environments/shared
        run: terraform init

      - name: Terraform Plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/terraform/environments/shared
        run: |
          terraform plan \
            -var-file="../shared.tfvars" \
            -var-file="terraform.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/terraform/environments/shared
        run: terraform apply tfplan

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No shared infrastructure changes detected, skipping."

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [test-lambda, test-web, shared-infrastructure]
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform apply \
            -var-file="../shared.tfvars" \
            -var-file="prod.tfvars" \
            -auto-approve

  deploy-lambda-basecamp:
    name: Deploy Lambda — Basecamp
    needs: [build-lambda, terraform-apply]
    uses: ./.github/workflows/deploy-lambda.yml
    with:
      environment: prod
      functions: basecamp/get basecamp/sidebar basecamp/trail-waypoints
    secrets:
      aws_role_arn: ${{ secrets.PROD_AWS_ROLE_ARN }}
      aws_region: ${{ secrets.AWS_REGION }}

  deploy-lambda-burn:
