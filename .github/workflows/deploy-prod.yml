      aws_region: ${{ secrets.AWS_REGION }}

  deploy-lambda-headwaters:
    name: Deploy Lambda — Headwaters
    needs: [build-lambda, terraform-apply]
    uses: ./.github/workflows/deploy-lambda.yml
    with:
